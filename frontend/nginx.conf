server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers - defense in depth. This SPA never renders
    # user-supplied HTML itself, but these are table stakes for anything
    # presented as an enterprise internal tool.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Vite fingerprints every build asset's filename with a content hash, so
    # these are safe to cache forever - a new deploy always ships new
    # filenames referenced by a freshly-served index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html itself must always be revalidated, or browsers could keep
    # serving stale asset references after a new deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Client-side routing (React Router's browser router) - fall back to
    # index.html for any path that isn't a real static file, so a hard
    # refresh on e.g. /orders/42 doesn't 404 against nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
