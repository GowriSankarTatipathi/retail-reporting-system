# Production overrides. Loaded when SPRING_PROFILES_ACTIVE=prod.
# All secrets/hosts are expected to come from environment variables (see .env.example) -
# nothing environment-specific is hardcoded here.
spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}

server:
  error:
    include-message: never
    include-binding-errors: never

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.gowrisankar.retailreporting: INFO
