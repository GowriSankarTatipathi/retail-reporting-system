spring:
  application:
    name: retail-reporting-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:retail_reporting}
    username: ${DB_USERNAME:retail_app}
    password: ${DB_PASSWORD:change_me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      pool-name: retail-reporting-hikari

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # schema is owned by Flyway migrations, never by Hibernate
    properties:
      hibernate:
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000 # 5 minutes default TTL; overridden per-cache in CacheConfig

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-placeholder-secret-not-for-production-use-please-change-me-1234567890}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    root: INFO
    com.gowrisankar.retailreporting: INFO
    org.hibernate.SQL: WARN
