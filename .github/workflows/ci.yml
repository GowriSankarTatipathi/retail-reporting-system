name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, unit tests, integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build, unit test, and integration test
        # A single `verify` run covers the whole lifecycle: compile -> unit tests
        # (surefire, bound to the `test` phase) -> package -> integration tests
        # (failsafe, bound to `integration-test`/`verify`). No external services are
        # needed - the `test` Spring profile uses H2 and an in-memory cache.
        run: mvn -B -ntp verify
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: dummy_secret_key_for_github_actions_tests

      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: "target/surefire-reports/*.xml,target/failsafe-reports/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed - verifies the Dockerfile builds cleanly)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: retail-reporting-system:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-build-and-test:
    name: Frontend - lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm run test:coverage
        env:
          VITE_API_BASE_URL: http://localhost:8080

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  frontend-build-docker-image:
    name: Frontend - build Docker image
    runs-on: ubuntu-latest
    needs: frontend-build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed - verifies the Dockerfile builds cleanly)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: retail-reporting-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max
